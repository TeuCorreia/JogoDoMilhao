<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <title>Vitória</title>
    <link rel="stylesheet" href="../arquivoscss/final.css" />
    <link rel="stylesheet" href="../arquivoscss/jogar.css" />
  </head>

  <body>
    <audio
      id="somVitoria"
      src="../sons/silvio-santos-parabens-ganhar-1-milhao-de-reais.mp3"
    ></audio>

    <div class="box">
      <h1>🏆 Parabéns!</h1>
      <p id="mensagem"></p>

      <br />

      <div class="alternativas">
        <div class="alternativa" onclick="voltarInicio()">
          Voltar para a tela inicial
        </div>
      </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    <script>
      function soltarConfete() {
        confetti({
          particleCount: 150,
          spread: 100,
          origin: { y: 0.6 },
        });
      }

      soltarConfete();
    </script>

    <script>
      const som = document.getElementById("somVitoria");

      window.onload = () => {
        som.play().catch(() => {
          console.log("Autoplay bloqueado 😢");
        });
      };

      function voltarInicio() {
        som.play(); // toca som ao clicar também
        window.location.href = "../index.html";
      }
    </script>
  </body>
</html>
