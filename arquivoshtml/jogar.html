<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Jogo do Milhão</title>
    <link href="../arquivoscss/jogar.css" rel="stylesheet" />

</head>
<body>

    <div class="container">
        <div class="header">
            Show do Milhão
        </div>

        <div class="pergunta-box">
            Qual é o planeta mais próximo do Sol no nosso sistema solar?
        </div>

        <div class="alternativas">
            <div class="alternativa">
                <span class="letra">1</span> Vênus
            </div>
            <div class="alternativa">
                <span class="letra">2</span> Marte
            </div>
            <div class="alternativa">
                <span class="letra">3</span> Mercúrio
            </div>
            <div class="alternativa">
                <span class="letra">4</span> Júpiter
            </div>
        </div>

        <div class="painel-inferior">
            <div class="ajudas">
                <button class="btn-ajuda">Cartas</button>
                <button class="btn-ajuda">Universitários</button>
                <button class="btn-ajuda">Placas</button>
                <button class="btn-ajuda">Pular (3)</button>
            </div>

            <div class="premios">
                <div class="premio-box">
                    <span class="premio-titulo">Errar</span>
                    <span class="premio-valor erra">R$ 50.000</span>
                </div>
                <div class="premio-box">
                    <span class="premio-titulo">Parar</span>
                    <span class="premio-valor para">R$ 100.000</span>
                </div>
                <div class="premio-box">
                    <span class="premio-titulo">Acertar</span>
                    <span class="premio-valor acerta">R$ 200.000</span>
                </div>
            </div>
        </div>
    </div>

</body>
</html>
